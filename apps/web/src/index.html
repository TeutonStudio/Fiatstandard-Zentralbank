<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiatstandard Zentralbank – Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Fiatstandard Zentralbank</h1>
      <p class="hinweis">Browser-Client für die serverautoritativ ausgeführte Spiel-Engine.</p>

      <section>
        <h2>Verbindung</h2>
        <label>API-Basis-URL <input id="api-base" value="http://127.0.0.1:8080" /></label>
        <button id="health">Server prüfen</button>
        <output id="server-status">Noch nicht geprüft</output>
      </section>

      <section>
        <h2>Spiel</h2>
        <label>Spielernamen <input id="spieler" value="Anna, Bert, Carla" /></label>
        <label>Öffentlicher KI-Spielstil
          <select id="spielstil">
            <option>VORSICHTIG</option><option>PRODUKTIONSORIENTIERT</option>
            <option>SCHULDENFINANZIERT</option><option>HANDELSORIENTIERT</option>
            <option>AGGRESSIV</option><option>OPPORTUNISTISCH</option>
            <option>EXPANSIONISTISCH</option><option>DEFENSIVE_DOMINANZ</option>
          </select>
        </label>
        <label>Entwickler-Agent
          <select id="agent">
            <option value="sicherheit">Sicherheitsagent</option>
            <option value="zufall">Zufallsagent</option><option value="wirtschaft">Wirtschaftsagent</option>
            <option value="aggressiv">Aggressiver Agent</option><option value="defensiv">Defensiver Agent</option>
            <option value="onnx">ONNX-Modellagent (mit Fallback)</option>
          </select>
        </label>
        <output id="agent-status">Agent: Sicherheitsagent</output>
        <button id="erstellen">Spiel erstellen</button>
        <label>Spiel-ID <input id="spiel-id" inputmode="numeric" /></label>
        <button id="laden">Zustand laden</button>
        <pre id="zustand">Kein Spiel geladen.</pre>
        <button id="beobachtung-laden">Öffentliche Beobachtung v2 laden</button>
        <pre id="beobachtung">Keine Beobachtung geladen.</pre>
      </section>

      <section>
        <h2>Simulation und Agentenliga</h2>
        <label>Anzahl <input id="sim-spiele" type="number" min="1" value="2" /></label>
        <button id="simulation-starten">Simulation starten</button>
        <button id="liga-starten">Liga starten</button>
        <button id="liga-laden">Letzte Liga laden</button>
        <pre id="simulation">Noch kein Lauf.</pre>
      </section>

      <section>
        <h2>Erlaubte Aktionen</h2>
        <button id="aktionen-laden">Aktionen abrufen</button>
        <select id="aktionen" size="6"></select>
        <button id="aktion-senden">Ausgewählte Aktion senden</button>
      </section>

      <section id="fehler-bereich" hidden>
        <h2>Fehler</h2>
        <pre id="fehler"></pre>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
